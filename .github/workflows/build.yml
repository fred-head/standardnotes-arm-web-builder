name: Standard Notes ARM Builder

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  release-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Get latest Standard Notes release
        run: |
          RELEASE=$(curl -s https://api.github.com/repos/standardnotes/app/releases/latest | jq -r .tag_name)

          VERSION=$(echo "$RELEASE" | sed 's/^@standardnotes\/desktop@//')

          echo "RELEASE=$RELEASE" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV

          echo "Latest release:"
          echo "$RELEASE"

          echo ""
          echo "Detected version:"
          echo "$VERSION"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if image already exists
        run: |
          if docker manifest inspect ghcr.io/fred-head/standardnotes-arm-web:${VERSION} >/dev/null 2>&1; then
            echo "Image version ${VERSION} already exists."
            echo "BUILD_NEEDED=false" >> $GITHUB_ENV
          else
            echo "Image version ${VERSION} does not exist."
            echo "BUILD_NEEDED=true" >> $GITHUB_ENV
          fi

      - name: Show decision
        run: |
          echo "Release: $RELEASE"
          echo "Version: $VERSION"
          echo "Build needed: $BUILD_NEEDED"
