name: Test Workflow

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Test
        run: |
          echo "Hello OCI Homelab"
          uname -a

      - name: Build Docker Image
        run: |
          docker build -t test-image .
