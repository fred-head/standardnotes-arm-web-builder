name: Standard Notes ARM Builder

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Builder Repository
        uses: actions/checkout@v5

      - name: Get latest Standard Notes release
        run: |
          RELEASE=$(curl -s https://api.github.com/repos/standardnotes/app/releases/latest | jq -r .tag_name)

          VERSION=$(echo "$RELEASE" | sed 's/^@standardnotes\/desktop@//')

          echo "RELEASE=$RELEASE" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV

          echo "Latest release: $RELEASE"
          echo "Detected version: $VERSION"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if image already exists
        run: |
          if docker manifest inspect ghcr.io/fred-head/standardnotes-arm-web:${VERSION} >/dev/null 2>&1; then
            echo "BUILD_NEEDED=false" >> $GITHUB_ENV
            echo "Image ${VERSION} already exists"
          else
            echo "BUILD_NEEDED=true" >> $GITHUB_ENV
            echo "Image ${VERSION} does not exist"
          fi

      - name: Clone Standard Notes
        if: env.BUILD_NEEDED == 'true'
        run: |
          git clone --depth=1 https://github.com/standardnotes/app.git standardnotes

      - name: Set up QEMU
        if: env.BUILD_NEEDED == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: env.BUILD_NEEDED == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        if: env.BUILD_NEEDED == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: |
            ghcr.io/fred-head/standardnotes-arm-web:latest
            ghcr.io/fred-head/standardnotes-arm-web:${{ env.VERSION }}
