name: Standard Notes ARM Builder

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  release-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Builder Repository
        uses: actions/checkout@v5

      - name: Get latest Standard Notes release
        run: |
          RELEASE=$(curl -s https://api.github.com/repos/standardnotes/app/releases/latest | jq -r .tag_name)

          VERSION=$(echo "$RELEASE" | sed 's/^@standardnotes\/desktop@//')

          echo "RELEASE=$RELEASE" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV

          echo "Latest release:"
          echo "$RELEASE"

          echo ""
          echo "Detected version:"
          echo "$VERSION"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if image already exists
        run: |
          if docker manifest inspect ghcr.io/fred-head/standardnotes-arm-web:${VERSION} >/dev/null 2>&1; then
            echo "Image version ${VERSION} already exists."
            echo "BUILD_NEEDED=false" >> $GITHUB_ENV
          else
            echo "Image version ${VERSION} does not exist."
            echo "BUILD_NEEDED=true" >> $GITHUB_ENV
          fi

      - name: Clone Standard Notes
        if: env.BUILD_NEEDED == 'true'
        run: |
          git clone --depth=1 https://github.com/standardnotes/app.git standardnotes

      - name: Verify Standard Notes checkout
        if: env.BUILD_NEEDED == 'true'
        run: |
          cd standardnotes

          echo "Repository cloned successfully"

          git rev-parse --short HEAD

          ls -la

          test -d packages/web && echo "packages/web found"

      - name: Setup Node.js
        if: env.BUILD_NEEDED == 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: standardnotes/.nvmrc

      - name: Show versions
        if: env.BUILD_NEEDED == 'true'
        run: |
          cd standardnotes

          corepack enable

          echo "Node version:"
          node --version

          echo ""

          echo "Yarn version:"
          yarn --version

      - name: Install dependencies
        if: env.BUILD_NEEDED == 'true'
        run: |
          cd standardnotes

          corepack enable

          yarn install --immutable

      - name: Build web app
        if: env.BUILD_NEEDED == 'true'
        run: |
          cd standardnotes

          corepack enable

          yarn build:web

      - name: Verify build output
        if: env.BUILD_NEEDED == 'true'
        run: |
          cd standardnotes

          echo "Contents of packages/web:"
          ls -lah packages/web

          echo ""

          echo "Contents of packages/web/dist:"
          ls -lah packages/web/dist

      - name: Verify build output
        if: env.BUILD_NEEDED == 'true'
        run: |
          cd standardnotes

          echo "Build output:"

          find packages/web -type d -name dist

          echo ""

          du -sh packages/web/dist || true

          echo ""

          ls -lah packages/web/dist || true
